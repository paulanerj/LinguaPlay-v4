<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaPlay - Subtitle Learning Engine</title>
    <link rel="stylesheet" href="/css/app.css">
  </head>
  <body>
    <div id="app-container">
      <div id="main-content">
        <div id="video-surface">
          <video controls>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
          </video>
          <div id="subtitle-display" class="hidden"></div>
        </div>
        
        <div id="controls-bar">
          <div class="flex items-center gap-4">
            <div class="text-sm opacity-50">LinguaPlay Core v0.4.0</div>
            
            <div class="flex gap-2">
              <button id="btn-load-video" class="ui-btn">Load Video</button>
              <button id="btn-load-srt" class="ui-btn">Load SRT</button>
              <button id="btn-demo" class="ui-btn">Demo</button>
            </div>

            <div class="flex gap-2 ml-4 border-l border-slate-700 pl-4">
              <button id="btn-slow-mode" class="ui-btn text-xs">Speed: 1.0x</button>
            </div>

            <input type="file" id="input-video" accept="video/*" class="hidden">
            <input type="file" id="input-srt" accept=".srt" class="hidden">
          </div>

          <div id="status-line" class="text-[10px] uppercase tracking-widest opacity-40 flex-1 text-right">
            demo mode active
          </div>
          
          <div id="session-metrics" class="text-[10px] uppercase tracking-widest opacity-60 flex gap-4 ml-4">
            <span>Seen: <span id="metric-seen" class="font-bold text-accent-primary">0</span></span>
            <span>Reviewed: <span id="metric-reviewed" class="font-bold text-accent-secondary">0</span></span>
            <span>Rescued: <span id="metric-rescued" class="font-bold text-green-400">0</span></span>
            <span>Pressure: <span id="metric-pressure" class="font-bold text-orange-400">0%</span></span>
          </div>

          <div id="status-lexicon" class="text-xs text-accent ml-4">Lexicon: Loading...</div>
        </div>

        <div id="transcript-panel"></div>
      </div>

      <div id="focus-panel">
        <div class="flex h-full items-center justify-center opacity-30 text-center">
          Select a token to view details and examples.
        </div>
      </div>
    </div>

    <div id="quick-preview-tooltip" class="hidden"></div>

    <script type="module" src="/js/app.ts"></script>
  </body>
</html>
