<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaPlay - Subtitle Learning Engine</title>
    <link rel="stylesheet" href="/css/app.css">
  </head>
  <body>
    <div id="app-container">
      <div id="main-content">
        <div id="video-surface">
          <video controls>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
          </video>
          <div id="subtitle-display" class="hidden"></div>
        </div>
        
        <div id="controls-bar" class="flex-wrap">
          <div class="flex flex-wrap items-center gap-4 w-full md:w-auto">
            <div class="text-sm opacity-50 w-full md:w-auto text-center md:text-left">LinguaPlay Core v0.4.0</div>
            
            <div class="flex flex-wrap gap-2 justify-center w-full md:w-auto">
              <button id="btn-load-video" class="ui-btn">Load Video</button>
              <button id="btn-load-srt" class="ui-btn">Load SRT</button>
              <button id="btn-demo" class="ui-btn">Demo</button>
            </div>

            <div class="flex flex-wrap gap-2 md:ml-4 md:border-l border-slate-700 md:pl-4 items-center justify-center w-full md:w-auto mt-2 md:mt-0">
              <button id="btn-slow-mode" class="ui-btn text-xs">Speed: 1.0x</button>
              <select id="view-mode-select" class="ui-btn text-xs bg-slate-800 border border-slate-700 rounded text-white outline-none cursor-pointer">
                <option value="CINEMA">Cinema Mode</option>
                <option value="STUDY" selected>Study Mode</option>
                <option value="INTENSIVE">Intensive Mode</option>
              </select>
              <label class="flex items-center gap-2 text-xs cursor-pointer opacity-60 hover:opacity-100 transition-opacity">
                <input type="checkbox" id="toggle-dev-mode" class="rounded border-slate-700 bg-slate-800 text-accent-primary focus:ring-accent-primary focus:ring-offset-slate-900">
                Dev Mode
              </label>
            </div>

            <input type="file" id="input-video" accept="video/*" class="hidden">
            <input type="file" id="input-srt" accept=".srt" class="hidden">
          </div>

          <div id="status-line" class="text-[10px] uppercase tracking-widest opacity-40 flex-1 text-center md:text-right mt-2 md:mt-0 w-full md:w-auto">
            demo mode active
          </div>
          
          <div id="session-metrics" class="text-[10px] uppercase tracking-widest opacity-60 flex gap-4 ml-4 hidden">
            <span>Seen: <span id="metric-seen" class="font-bold text-accent-primary">0</span></span>
            <span>Reviewed: <span id="metric-reviewed" class="font-bold text-accent-secondary">0</span></span>
            <span>Rescued: <span id="metric-rescued" class="font-bold text-green-400">0</span></span>
            <span>Pressure: <span id="metric-pressure" class="font-bold text-orange-400">0%</span></span>
          </div>

          <div id="status-lexicon" class="text-xs text-accent ml-4">Lexicon: Loading...</div>
        </div>

        <div id="workspace">
          <div id="transcript-panel"></div>
          <div id="focus-panel">
            <div class="flex h-full items-center justify-center opacity-30 text-center">
              Select a token to view details and examples.
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="quick-preview-tooltip" class="hidden"></div>

    <script type="module" src="/js/app.ts"></script>
  </body>
</html>
