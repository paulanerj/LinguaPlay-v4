<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaPlay - Subtitle Learning Engine</title>
    <link rel="stylesheet" href="/css/app.css">
  </head>
  <body>
    <div id="app-container">
      <div id="main-content">
        <div id="video-surface">
          <video controls>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
          </video>
          <div id="subtitle-display" class="hidden"></div>
        </div>
        
        <div id="controls-bar">
          <div class="text-sm opacity-50">LinguaPlay Core v0.4.0</div>
          <div id="status-lexicon" class="text-xs text-accent">Lexicon: Loading...</div>
          
          <div class="flex gap-2 ml-auto">
            <button id="btn-load-video" class="ui-btn">Load Video</button>
            <button id="btn-load-srt" class="ui-btn">Load SRT</button>
            <button id="btn-load-demo" class="ui-btn opacity-50">Demo</button>
            <input type="file" id="input-video" accept="video/*" class="hidden">
            <input type="file" id="input-srt" accept=".srt" class="hidden">
          </div>
          
          <div id="diagnostic-label" class="diagnostic-label">Diagnostic Demo</div>
          <div id="load-status" class="text-[10px] opacity-40 italic">Diagnostic Demo Active</div>
        </div>

        <div id="transcript-panel"></div>
      </div>

      <div id="focus-panel">
        <div class="flex h-full items-center justify-center opacity-30 text-center">
          Select a token to view details and examples.
        </div>
      </div>
    </div>

    <div id="quick-preview-tooltip" class="hidden"></div>
    <div id="debug-attention-label" class="hidden fixed bg-white text-black text-[10px] px-2 py-1 rounded shadow-lg z-[100] font-bold pointer-events-none">Suggested Next Learning Target</div>

    <!-- Heatmap Legend -->
    <div id="heatmap-legend" class="fixed bottom-4 right-4 z-50 bg-slate-900/80 border border-white/10 rounded-lg p-2 flex flex-col gap-1 text-[9px] uppercase tracking-tighter opacity-60 pointer-events-none">
      <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-400"></span> Known</div>
      <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-400"></span> Common</div>
      <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-yellow-400"></span> Medium</div>
      <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-orange-500"></span> Rare</div>
      <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-red-500"></span> Unknown</div>
      <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-slate-500"></span> Non-lexical</div>
    </div>

    <script type="module" src="/js/app.ts"></script>
  </body>
</html>
